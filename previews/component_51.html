<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRDS Component Preview</title>
    <script defer src="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.css" type="text/css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="../node_modules/krds-uiux/resources/css/common/common.css" />
    <style>
        body { margin: 0; padding: 24px; background-color: transparent; }
    </style>
</head>
<body>
<!-- step indicator -->
<!-- 스텝 -->
<ol class="krds-step-wrap">
	<li class="done">
        <span>
            <i class="step">1단계</i>
            <span class="step-tit">단계 레이블</span>
        </span>
	</li>
	<li class="done">
        <span>
            <i class="step">2단계</i>
            <span class="step-tit">단계 레이블</span>
        </span>
	</li>
	<li class="done">
        <span>
            <i class="step">3단계</i>
            <span class="step-tit">단계 레이블</span>
        </span>
	</li>
	<li class="active">
        <span>
            <em class="sr-only">현재단계</em>
            <i class="step">4단계</i>
            <span class="step-tit">단계 레이블</span>
        </span>
	</li>
	<li>
        <span>
            <i class="step">5단계</i>
            <span class="step-tit">단계 레이블</span>
        </span>
	</li>
</ol>
<!-- //스텝 -->

<br>
<br>

<!-- 페이지 타이틀과 스텝 혼합 -->
<div class="page-title-wrap between">
	<h2 class="h-tit">타이틀</h2>
	<!-- 스텝 영역 -->
	<ol class="krds-step-wrap">
		<li class="done">
            <span>
                <i class="step">1단계</i>
                <span class="step-tit">유의 사항 확인</span>
            </span>
		</li>
		<li class="done">
            <span>
                <i class="step">2단계</i>
                <span class="step-tit">신청인 정보</span>
            </span>
		</li>
		<li class="active">
            <span>
                <em class="sr-only">현재단계</em>
                <i class="step">3단계</i>
                <span class="step-tit">이사 전 살던 곳</span>
            </span>
		</li>
		<li>
            <span>
                <i class="step">4단계</i>
                <span class="step-tit">이사 온 곳</span>
            </span>
		</li>
	</ol>
	<!-- //스텝 영역 -->
</div>
<!-- //페이지 타이틀과 스텝 혼합 -->
<!-- //step indicator -->
</body>
</html>
