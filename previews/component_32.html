<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRDS Component Preview</title>
    <script defer src="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.css" type="text/css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="../node_modules/krds-uiux/resources/css/common/common.css" />
    <style>
        body { margin: 0; padding: 24px; background-color: transparent; }
    </style>
</head>
<body>
<!-- language switcher -->
<div class="krds-drop-wrap krds-language">
  <button type="button" class="krds-btn small text drop-btn">
    <i class="svg-icon ico-global"></i>
    언어 변경
    <i class="svg-icon ico-toggle"></i>
  </button>
  <div class="drop-menu">
    <div class="drop-in">
      <div class="drop-top">
        <p class="current-laguage">
          <span>현재 언어</span>
          <strong>한국어</strong>
        </p>
      </div>
      <ul class="drop-list">
        <li><a href="#" class="item-link" lang="en" target="_blank" title="새 창 열림">English (영어)<i class="svg-icon ico-go"></i></a></li>
        <li><a href="#" class="item-link" lang="zh" target="_blank" title="새 창 열림">中文 (중국어)<i class="svg-icon ico-go"></i></a></li>
        <li><a href="#" class="item-link" lang="ja" target="_blank" title="새 창 열림">日本語 (일본어)<i class="svg-icon ico-go"></i></a></li>
        <li><a href="#" class="item-link" lang="fr" target="_blank" title="새 창 열림">français (프랑스어)<i class="svg-icon ico-go"></i></a></li>
      </ul>
    </div>
  </div>
</div>
<!-- //language switcher -->
</body>
</html>
