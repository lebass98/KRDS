<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRDS Component Preview</title>
    <script defer src="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.css" type="text/css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="../node_modules/krds-uiux/resources/css/common/common.css" />
    <style>
        body { margin: 0; padding: 24px; background-color: transparent; }
    </style>
</head>
<body>
<!-- button -->
<button type="button" class="krds-btn icon">
	<span class="sr-only">검색</span>
	<i class="svg-icon ico-sch"></i>
</button>
<button type="button" class="krds-btn icon medium">
	<span class="sr-only">입력한 비밀번호 보기</span>
	<i class="svg-icon ico-pw-visible"></i>
</button>
<button class="krds-btn icon medium btn-help-exec">
	<span class="sr-only">도움말</span>
	<i class="svg-icon ico-help"></i>
</button>

<button type="button" class="krds-btn large icon border">
	<span class="sr-only">새로고침</span>
	<i class="svg-icon ico-refresh"></i>
</button>
<button type="button" class="krds-btn large icon border" disabled>
	<span class="sr-only">열기</span>
	<i class="svg-icon ico-angle down"></i>
</button>
<!-- //button -->
</body>
</html>
