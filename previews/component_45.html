<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRDS Component Preview</title>
    <script defer src="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/krds-uiux@1.0.3/resources/cdn/krds.min.css" type="text/css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="../node_modules/krds-uiux/resources/css/common/common.css" />
    <style>
        body { margin: 0; padding: 24px; background-color: transparent; }
    </style>
</head>
<body>
<!-- select -->
<div class="fieldset">
	<!-- 폼그룹 -->
	<div class="form-group">
		<div class="form-tit">
			<label for="select_size_small">레이블</label>
		</div>
		<div class="form-conts">
			<select id="select_size_small" class="krds-form-select large" title="선택">
				<option value="" selected>large</option>
				<option value="">medium</option>
				<option value="">small</option>
			</select>
		</div>
		<p class="form-hint">도움말</p>
	</div>
	<!-- //폼그룹 -->
	<!-- 폼그룹 -->
	<div class="form-group">
		<div class="form-tit">
			<label for="select_size_medium">레이블</label>
		</div>
		<div class="form-conts">
			<select id="select_size_medium" class="krds-form-select medium" title="선택">
				<option value="">large</option>
				<option value="" selected>medium</option>
				<option value="">small</option>
			</select>
		</div>
		<p class="form-hint">도움말</p>
	</div>
	<!-- //폼그룹 -->
	<!-- 폼그룹 -->
	<div class="form-group">
		<div class="form-tit">
			<label for="select_size_large">레이블</label>
		</div>
		<div class="form-conts">
			<select id="select_size_large" class="krds-form-select small" title="선택">
				<option value="">large</option>
				<option value="">medium</option>
				<option value="" selected>small</option>
			</select>
		</div>
		<p class="form-hint">도움말</p>
	</div>
	<!-- //폼그룹 -->
</div>
<!-- //select -->
</body>
</html>
